<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0d7ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" ry="14" fill="none"
        stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Lightning bolt — centered, bold -->
  <path
    d="M36 6 L18 34 H30 L28 58 L46 30 H34 Z"
    fill="url(#boltGrad)"
    filter="url(#glow)"
  />
</svg>